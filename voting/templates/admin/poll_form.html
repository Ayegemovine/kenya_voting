{% extends "base.html" %}

{% block content %}
<div style="background: var(--bg-light); padding: 80px 0; min-height: 80vh;">
    <div class="container" style="display: flex; justify-content: center;">
        <div style="background: white; width: 100%; max-width: 600px; padding: 50px; border-radius: 24px; border: 1px solid #E5E7EB; box-shadow: 0 20px 50px rgba(0,0,0,0.05);">
            
            <div style="margin-bottom: 30px;">
                <a href="{% url 'admin_dashboard' %}" style="text-decoration: none; color: #64748B; font-size: 13px; font-weight: 700;">← Back to Manager</a>
                <h1 style="color: var(--primary-blue); font-size: 28px; margin-top: 15px; font-weight: 900;">Create New Poll</h1>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Poll Question</label>
                    <input type="text" name="text" placeholder="e.g., Who should be the next Chairperson?" required>
                </div>

                <div class="form-group">
                    <label>Expiration Deadline (Optional)</label>
                    <input type="datetime-local" name="deadline">
                    <small style="color: #94A3B8; display: block; margin-top: 5px;">Leave blank for no expiration.</small>
                </div>

                <div id="options-container" style="margin-top: 30px;">
                    <label style="display: block; font-size: 11px; font-weight: 700; color: var(--primary-blue); text-transform: uppercase; margin-bottom: 10px;">Poll Options</label>
                    <div class="option-input-wrapper" style="margin-bottom: 10px;">
                        <input type="text" name="options" placeholder="Option 1" required>
                    </div>
                    <div class="option-input-wrapper" style="margin-bottom: 10px;">
                        <input type="text" name="options" placeholder="Option 2" required>
                    </div>
                </div>

                <button type="button" onclick="addOption()" style="background: none; border: 1.5px dashed #CBD5E1; width: 100%; padding: 12px; border-radius: 10px; color: #64748B; font-weight: 700; cursor: pointer; margin-top: 10px;">
                    + Add Another Option
                </button>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 40px; padding: 16px; border-radius: 12px; border: none; background: var(--primary-blue); color: white; font-weight: 800; cursor: pointer;">
                    🚀 Launch Global Poll
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function addOption() {
        const container = document.getElementById('options-container');
        const count = container.getElementsByClassName('option-input-wrapper').length + 1;
        const div = document.createElement('div');
        div.className = 'option-input-wrapper';
        div.style.marginBottom = '10px';
        div.innerHTML = `<input type="text" name="options" placeholder="Option ${count}">`;
        container.appendChild(div);
    }
</script>

<style>
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--primary-blue); text-transform: uppercase; margin-bottom: 8px; }
    input[type="text"], input[type="datetime-local"] { 
        width: 100%; padding: 14px; border: 1.5px solid #E2E8F0; border-radius: 12px; font-size: 14px; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 4px rgba(10, 37, 100, 0.05); }
</style>
{% endblock %}
